  use_llm_fallback: false
notes:
  ingredients_language: pt-BR
  ingredients_format: unknown
  platform_detail: iis_server_down
  inci_available: false
  inci_note: >-
    USK (USK Under Skin) is a pharmaceutical/dermatological brand. Their main
    hair product is Neosil (anti-hair-loss shampoo). The official site usk.com.br
    runs on IIS and currently returns HTTP 403 Forbidden -- the site is
    misconfigured or intentionally down. Products are sold exclusively through
    drugstores and pharmacies (Droga Raia, Drogasil, Panvel, etc.).
    No direct e-commerce site available for scraping. Brand status set to BLOCKED.
  product_focus: pharmaceutical_haircare
  parent_company: USK Under Skin Pharmaceuticals
  waf: none
  status: blocked
  blocked_reason: >-
    No functioning e-commerce website. usk.com.br returns 403 (IIS default page).
    SSL connection also fails on port 443. Products only available through
    third-party pharmacies and marketplaces.
  known_products:
  - Neosil Shampoo Antiqueda 200ml
  - Neosil Attack
  - Neosil Collagen
version: 1
