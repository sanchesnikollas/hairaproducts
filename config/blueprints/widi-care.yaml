brand_slug: widi-care
brand_name: Widi Care
platform: nuvemshop
domain: lojawidicare.com.br
allowed_domains:
- lojawidicare.com.br
entrypoints:
- https://lojawidicare.com.br/shampoo/
- https://lojawidicare.com.br/condicionador/
- https://lojawidicare.com.br/creme-de-pentear/
- https://lojawidicare.com.br/finalizador/
- https://lojawidicare.com.br/mascara-de-tratamento/
- https://lojawidicare.com.br/tratamento-capilar/
discovery:
  strategy: sitemap_first
  sitemap_urls:
  - https://acdn-us.mitiendanube.com/stores/003/941/769/themes/common/sitemap.xml.gz
  - https://lojawidicare.com.br/sitemap.xml
  product_url_pattern: ^https://lojawidicare\.com\.br/produtos/[\w%-]+/$
  max_pages: 500
  pagination:
    type: none
    max_pages: 1
extraction:
  requires_js: false
  headless: false
  ssl_verify: true
  delay_seconds: 3
  inci_selectors:
  - ".product-description table td:last-child"
  - "#product-description table td p"
  - "#product-description .product-description p"
  - "#product-description p"
  name_selectors:
  - h1.js-product-name
  - h1
  image_selectors:
  - img.js-product-slide-img
  - "img[src*='mitiendanube.com']"
  price_selectors:
  - span.js-price-display
  - '[class*="price"]'
  section_label_map:
    description:
      labels:
      - "descri\xE7\xE3o"
      - detalhes
      - sobre o produto
    care_usage:
      labels:
      - modo de usar
      - como usar
      - "modo de aplica\xE7\xE3o"
    composition:
      labels:
      - "princ\xEDpio ativo"
      - ativos
    ingredients_inci:
      labels:
      - "composi\xE7\xE3o"
      - ingredientes
      - ingredients
      validators:
      - has_separators
      - min_length_30
    benefits:
      labels:
      - resultado
      - "benef\xEDcios"
  wait_for_selector: null
  use_llm_fallback: true
notes:
  ingredients_language: portuguese_translated
  ingredients_format: portuguese_names_slash_separated
  platform_detail: nuvemshop_tiendanube
  inci_available: partial
  inci_note: >-
    INCI lists are published on some product pages inside a table within
    .product-description, under an "ingredientes" heading row. Ingredients
    are listed in Portuguese translated names separated by slashes (e.g.
    "Agua / Lauril Sulfosuccinato de Sodio"). Not all products have
    ingredient lists -- coverage is partial.
  product_focus: haircare
  waf: none
  ssl_expired: false
version: 1
