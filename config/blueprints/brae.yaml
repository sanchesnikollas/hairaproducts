brand_slug: brae
brand_name: "Bra\xE9"
platform: vtex
domain: www.brae.com.br
allowed_domains:
- www.brae.com.br
entrypoints:
- https://www.brae.com.br/produtos
discovery:
  strategy: sitemap_first
  sitemap_urls:
  - https://www.brae.com.br/sitemap.xml
  - https://www.brae.com.br/sitemap/product-0.xml
  product_url_pattern: ^https://www\.brae\.com\.br/[\w%-]+/p$
  max_pages: 500
  pagination:
    type: none
    max_pages: 1
extraction:
  requires_js: true
  headless: false
  ssl_verify: true
  delay_seconds: 3
  inci_selectors: []
  name_selectors:
  - "h1 .vtex-store-components-3-x-productBrand"
  - h1
  - .product-name
  image_selectors:
  - "img.vtex-store-components-3-x-productImageTag"
  - "img[src*='brae.com.br']"
  - "img[src*='vtexassets']"
  - .product-image img
  price_selectors:
  - ".vtex-product-price-1-x-sellingPriceValue"
  - ".vtex-product-price-1-x-sellingPrice"
  - '[class*="sellingPrice"]'
  - '[class*="price"]'
  section_label_map:
    description:
      labels:
      - "descri\xE7\xE3o do produto"
      - detalhes
      - sobre o produto
      - "descri\xE7\xE3o"
      - o produto
    care_usage:
      labels:
      - modo de uso
      - como usar
      - "modo de aplica\xE7\xE3o"
    composition:
      labels:
      - ativos principais
      - "composi\xE7\xE3o"
      - "f\xF3rmula"
      - "princ\xEDpio ativo"
      - ativos
    ingredients_inci:
      labels:
      - ingredientes
      - ingredients
      - "composi\xE7\xE3o completa"
      - "lista de ingredientes"
      validators:
      - has_separators
      - min_length_30
      - no_marketing_verbs
    benefits:
      labels:
      - "principais benef\xEDcios"
      - "a\xE7\xE3o / resultado"
      - "benef\xEDcios"
      - resultado
      - dica do expert
  wait_for_selector: ".accordion-container"
  use_llm_fallback: true
notes:
  ingredients_language: pt-BR
  ingredients_format: inci_standard
  platform_detail: vtex_io
  inci_available: false
  inci_note: >-
    VTEX IO site with custom accordion sections. Product pages contain
    description, ativos principais, beneficios, and modo de uso but NO
    INCI ingredient lists. Confirmed 2026-03-22 across multiple product
    types (shampoo, conditioner, leave-in, oil, powder). All products
    will be catalog_only. The site has ~69 individual products and ~98 kits.
    Some products may be makeup (palettes, eyeshadow) rather than haircare.
  product_focus: haircare
  waf: none
  requires_headed_browser: true
  non_hair_products: true
  non_hair_note: "Site also sells makeup (palettes, eyeshadow, iluminador). Filter by URL or category."
version: 1
