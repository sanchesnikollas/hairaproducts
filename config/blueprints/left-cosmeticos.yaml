brand_slug: left-cosmeticos
brand_name: Left Cosméticos
platform: nuvemshop
domain: leftcosmeticos.com.br
allowed_domains:
- leftcosmeticos.com.br
- www.leftcosmeticos.com.br
entrypoints:
- https://leftcosmeticos.com.br/
discovery:
  strategy: sitemap_first
  sitemap_urls:
  - https://leftcosmeticos.com.br/sitemap.xml
  - https://leftcosmeticos.com.br/sitemap-products.xml
  product_url_pattern: ^https?://(?:www\.)?leftcosmeticos\.com\.br/produto[s]?/[\w-]+
  max_pages: 500
  pagination:
    type: none
    max_pages: 1
extraction:
  requires_js: false
  headless: true
  delay_seconds: 2
  name_selectors:
  - h1.product-name
  - h1.js-product-name
  - h1
  image_selectors:
  - .js-product-slides img
  - .product-image img
  price_selectors:
  - .js-price-display
  - .price
  - .js-product-price
  inci_selectors:
  - .js-product-description
  - .user-content
  - .product-description
  section_label_map:
    description:
      labels:
      - descrição
      - detalhes
      - sobre
    care_usage:
      labels:
      - como usar
      - modo de uso
      - aplicação
    composition:
      labels:
      - composição
      - fórmula
      - ativos
    ingredients_inci:
      labels:
      - ingredientes
      - ingredients
      - inci
    benefits:
      labels:
      - benefícios
      - resultado
  use_llm_fallback: false
notes:
  auto_generated: true
  platform_detail: nuvemshop
  inci_available: unknown
  inci_note: Auto-generated blueprint; review after first scrape.
  triage_tier: tier_1_easy
version: 1
