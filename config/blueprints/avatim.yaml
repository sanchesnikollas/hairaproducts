brand_slug: avatim
brand_name: Avatim
platform: vnda
domain: www.avatim.com.br
allowed_domains:
- www.avatim.com.br
entrypoints:
- https://www.avatim.com.br/cabelo
discovery:
  strategy: sitemap_first
  sitemap_urls:
  - https://www.avatim.com.br/sitemap.xml
  product_url_pattern: ^https://www\.avatim\.com\.br/produto/(?:[\w%-]*(?:xampu|shampoo|condicionador|mascara|m%C3%A1scara|leave-in|oleo-capilar|%C3%B3leo-capilar|tonico-capilar|t%C3%B4nico-capilar|creme-de-pentear|creme-para-pentear|cabelo|capilar)[\w%-]*)-\d+$
  url_blocklist:
  - agua-para-roupas
  - "%C3%A1gua-para-roupas"
  - difusor
  - vela
  - sache
  - "sach%C3%AA"
  - home-spray
  - aromatizador
  - ambiente
  max_pages: 100
  pagination:
    type: none
    max_pages: 1
extraction:
  requires_js: false
  headless: true
  delay_seconds: 3
  inci_selectors: []
  name_selectors:
  - h1
  - .product-name
  image_selectors:
  - 'meta[property="og:image"]'
  - 'link[rel="image_src"]'
  - '.product-images img[data-src]'
  - '.product-images img[src*="cdn.vnda.com.br"]'
  - '.product-images source[srcset]'
  - '.product-image img[data-src]'
  - '.product-image img[src]'
  - 'picture source[srcset*="cdn.vnda.com.br"]'
  - 'img[data-src*="cdn.vnda.com.br"]'
  - 'img[src*="cdn.vnda.com.br"]'
  description_selectors:
  - '.product-description'
  - '.product__description'
  - 'div[itemprop="description"]'
  - 'meta[name="description"]'
  price_selectors:
  - '[data-price]'
  - .product-price
  section_label_map:
    description:
      labels:
      - sobre o produto
      - "descri\xE7\xE3o"
      - detalhes
    care_usage:
      labels:
      - como usar
      - modo de uso
      - modo de aplicacao
      - "modo de aplica\xE7\xE3o"
      - como aplicar
      - aplicacao
      - "aplica\xE7\xE3o"
      - instrucoes de uso
      - "instru\xE7\xF5es de uso"
      - sugestao de uso
      - "sugest\xE3o de uso"
      - utilizacao
      - "utiliza\xE7\xE3o"
    composition:
      labels:
      - "composi\xE7\xE3o"
      - "f\xF3rmula"
    ingredients_inci:
      labels:
      - "composi\xE7\xE3o"
      - ingredientes
      - ingredients
      validators:
      - has_separators
      - min_length_30
    benefits:
      labels:
      - "benef\xEDcios"
      - resultado
      - sustentabilidade
  wait_for_selector: null
  use_llm_fallback: true
notes:
  ingredients_language: pt-BR
  ingredients_format: inci_standard
  platform_detail: vnda
  inci_available: true
  inci_note: "INCI lists are published in the 'MAIS INFORMACOES' tab under 'COMPOSICAO' label. Standard INCI nomenclature. Content is in HTML source (no JS rendering needed)."
  parent_brand: Avatim Cheiros da Terra
  product_focus: natural_cosmetics_perfumery_haircare
  hair_products_limited: true
  hair_lines: "Reserva (Muru Muru & Pataua), Curumim, Verbena & Bambu, Bonissimo, Seleto"
version: 1
