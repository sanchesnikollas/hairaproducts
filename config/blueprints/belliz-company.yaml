brand_slug: belliz-company
brand_name: Belliz Company
platform: vtex
domain: www.bellizcompany.com.br
allowed_domains:
- www.bellizcompany.com.br
entrypoints:
- https://www.bellizcompany.com.br/
discovery:
  strategy: sitemap_first
  sitemap_urls:
  - https://www.bellizcompany.com.br/sitemap.xml
  - https://www.bellizcompany.com.br/sitemap-1.xml
  - https://www.bellizcompany.com.br/sitemap-product-1.xml
  product_url_pattern: ^https://www\.bellizcompany\.com\.br/[\w-]+/p$
  max_pages: 500
  pagination:
    type: none
    max_pages: 1
extraction:
  requires_js: false
  headless: true
  delay_seconds: 2
  name_selectors:
  - h1.vtex-store-components-3-x-productNameContainer
  - h1.product-name
  - h1
  image_selectors:
  - img.vtex-store-components-3-x-productImageTag
  - .product-image img
  price_selectors:
  - span.vtex-product-price
  - .vtex-product-price-1-x-sellingPrice
  - .price
  inci_selectors:
  - .vtex-store-components-3-x-productDescriptionText
  - .product-description
  section_label_map:
    description:
      labels:
      - descrição
      - sobre
      - detalhes
    care_usage:
      labels:
      - como usar
      - modo de uso
      - aplicação
    composition:
      labels:
      - composição
      - fórmula
    ingredients_inci:
      labels:
      - ingredientes
      - ingredients
      - inci
    benefits:
      labels:
      - benefícios
      - resultado
  use_llm_fallback: false
notes:
  auto_generated: true
  platform_detail: vtex
  inci_available: rare
  inci_note: |
    Audited 2026-05-13 (pipeline-doctor). Belliz portfolio is ~50% hair accessories
    (escovas, espatulas, pentes, elasticos) and ~12% formula products. Verified via
    VTEX catalog API (/api/catalog_system/pub/products/search/{slug}/p): allSpecifications
    for ALL products is limited to ['Beneficios', 'Volume', 'Descubra por que ter na sua loja',
    'Antes', 'Depois']. NO structured INCI specification exists. The only products with
    extractable INCI are ~4-5 facial serums where ingredient list is embedded inline in
    description as '<strong>Composicao:</strong>' block - existing selectors already
    capture these (5 verified in DB). Coverage ceiling ~1-3% by full portfolio,
    ~8% by formula-only subset. RECOMMEND: mark for M3 source-scrape (alternate origin
    like ANVISA/EAN-based INCI lookup) if higher coverage required - blueprint cannot
    recover what site does not publish.
  triage_tier: tier_3_source_scrape
  audit_2026_05_13:
    total_products: 499
    accessories_estimate: 252
    formula_estimate: 60
    inci_verified: 5
    blueprint_action: none_required
    coverage_ceiling_pct: 3
version: 2
