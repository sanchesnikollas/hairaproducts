source_name: belezanaweb
source_slug: belezanaweb
platform: vtex
domain: www.belezanaweb.com.br
allowed_domains:
- www.belezanaweb.com.br
- belezanaweb.com.br
- data-exporter.belezanaweb.com.br
discovery:
  strategy: sitemap_first
  sitemap_urls:
  - https://data-exporter.belezanaweb.com.br/sitemap/1/produto1.xml
  - https://data-exporter.belezanaweb.com.br/sitemap/1/produto2.xml
  product_url_pattern: ^https://www\.belezanaweb\.com\.br/[\w%-]+/?$
  max_pages: 80000
extraction:
  # Beleza na Web is a custom storefront (not standard VTEX). Playwright is
  # blocked by Akamai ("Access Denied"), so requires_js must stay false. The
  # SSR HTML does not carry a "Composição" tab — only Detalhes / Como Usar /
  # Ação. We try the VTEX catalog API (no-op when no productId is found) and
  # then fall back to the product description body (.product-description-content)
  # which carries an inline INCI block for a small minority of products (mostly
  # kits). Realistic yield here is low; the file remains as an opportunistic
  # source — primary INCI comes from other distributors / official sites.
  requires_js: false
  http_client: curl_cffi
  curl_cffi_impersonate: chrome
  use_vtex_catalog_api: true
  delay_seconds: 3
  inci_selectors:
  - '#description-region .product-description-content'
  - '.product-description-content'
  - '[data-specification-name="Composição"] .vtex-product-specifications-1-x-specificationValue'
  - '[data-specification-name="Ingredientes"] .vtex-product-specifications-1-x-specificationValue'
  - '[data-specification-name="Composição"]'
  - '[data-specification-name="Ingredientes"]'
  name_selectors:
  - span.vtex-store-components-3-x-productBrand
  - h1
  image_selectors:
  - img.vtex-store-components-3-x-productImageTag
  section_label_map:
    ingredients_inci:
      labels:
      - ingredientes
      - composição
      - composicao
      - ingredients
      validators:
      - has_separators
      - min_length_30
  use_llm_fallback: false
brand_slug_map:
  bio-extratus: bio-extratus
  griffus: griffus
  lola-cosmetics: lola-cosmetics
  widi-care: widi-care
  aneethun: aneethun
  acquaflora: acquaflora
  brae: brae
  loccitane: loccitane
  alva: alva
  haskell: haskell
  salon-line: salon-line
