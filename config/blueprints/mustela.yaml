brand_slug: mustela
brand_name: Mustela
platform: shopify
domain: www.mustela.com.br
allowed_domains:
- www.mustela.com.br
entrypoints:
- https://www.mustela.com.br/collections/cabelo
discovery:
  strategy: sitemap_first
  sitemap_urls:
  - https://www.mustela.com.br/sitemap.xml
  - https://www.mustela.com.br/sitemap_products_1.xml?from=8790703538395&to=8916677787867
  product_url_pattern: ^https://www\.mustela\.com\.br/products/[\w-]+$
  max_pages: 100
  pagination:
    type: none
    max_pages: 1
extraction:
  requires_js: false
  headless: true
  delay_seconds: 3
  inci_selectors: []
  name_selectors:
  - h1
  - .product-name
  image_selectors:
  - img[src*="cdn.shopify.com"]
  - .product-image img
  price_selectors:
  - .product-price
  - '[class*="price"]'
  section_label_map:
    description:
      labels:
      - "descri\xE7\xE3o"
      - detalhes
      - sobre o produto
      - o produto
    care_usage:
      labels:
      - como usar
      - modo de uso
    composition:
      labels:
      - "composi\xE7\xE3o"
      - "f\xF3rmula"
    ingredients_inci:
      labels:
      - ingredientes
      - ingredients
      - "composi\xE7\xE3o completa"
      validators:
      - has_separators
      - min_length_30
    benefits:
      labels:
      - "benef\xEDcios"
      - resultado
  wait_for_selector: null
  accordion_click_selector: "[id^='accordion-header-']"
  ingredient_container_selector: .metafield-rich_text_field
  use_llm_fallback: true
notes:
  ingredients_language: pt-BR
  ingredients_format: inci_standard
  platform_detail: shopify
  inci_available: true
  inci_note: "INCI lists are published inside expandable accordion sections (Ingredientes). Both Portuguese names and standard INCI are provided."
  parent_brand: Mustela (Laboratoires Expanscience)
  product_focus: baby_child_skincare_haircare
  hair_products_limited: true
version: 1
