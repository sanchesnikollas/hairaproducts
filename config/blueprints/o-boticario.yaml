brand_slug: o-boticario
brand_name: O Boticário
platform: vtex
domain: www.boticario.com.br
allowed_domains:
- www.boticario.com.br
entrypoints:
- https://www.boticario.com.br/cabelos/shampoo/
- https://www.boticario.com.br/cabelos/condicionador/
- https://www.boticario.com.br/cabelos/tratamento/
- https://www.boticario.com.br/cabelos/leave-in-e-creme-para-pentear/
- https://www.boticario.com.br/cabelos/finalizador/
- https://www.boticario.com.br/cabelos/modelador/
- https://www.boticario.com.br/cabelos/kits-de-tratamento/
- https://www.boticario.com.br/cabelos/infantil/
discovery:
  strategy: dom_crawler
  sitemap_urls: []
  product_url_pattern: ^https://www\.boticario\.com\.br/[\w-]+/?$
  max_pages: 500
  pagination:
    type: scroll
    max_pages: 10
extraction:
  requires_js: true
  headless: false
  inci_selectors: []
  name_selectors:
  - h1
  - .product-name
  image_selectors:
  - .swiper img[src*="cloudinary"]
  - img[src*="cloudinary"]
  - .product-image img
  price_selectors:
  - '[class*="sellingPrice"]'
  - .product-price
  section_label_map:
    description:
      labels:
      - detalhes
      - sobre o produto
      - descrição
      - o produto
    care_usage:
      labels:
      - como usar
      - modo de uso
      - conselho de aplicação
    composition:
      labels:
      - composição
      - fórmula
    ingredients_inci:
      labels:
      - ingredientes
      - ingredients
      - composição completa
      validators:
      - has_separators
      - min_length_30
    benefits:
      labels:
      - ação / resultado
      - benefícios
      - resultado
  wait_for_selector: .accordion-pdp-header
  use_llm_fallback: true
notes:
  ingredients_language: pt-BR
  ingredients_format: portuguese_names
  waf: akamai
  requires_headed_browser: true
version: 1
