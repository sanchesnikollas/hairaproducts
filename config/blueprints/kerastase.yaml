brand_slug: kerastase
brand_name: Kérastase
platform: custom  # Salesforce Commerce Cloud (Demandware) + Cloudflare WAF
domain: www.kerastase.com.br
allowed_domains:
- www.kerastase.com.br
entrypoints:
- https://www.kerastase.com.br/colecoes-linhas/?insertMode=true&start=0&sz=24
- https://www.kerastase.com.br/produtos/colecoes/
discovery:
  strategy: entrypoint_crawl
  sitemap_urls: []
  product_url_pattern: '/produtos/.*\.html$'
  max_pages: 500
extraction:
  requires_js: false
  http_client: curl_cffi
  curl_cffi_impersonate: chrome131
  delay_seconds: 3
  inci_selectors:
  - .c-product-detail__ingredients p
  - .product-ingredients p
  - .product-ingredients
  - '#ingredientes p'
  - '#composicao p'
  - '[data-tab=''ingredientes''] p'
  name_selectors:
  - h1.c-product-main__name
  - h1.product-name
  - h1
  image_selectors:
  - .c-product-main__image img
  - .product-image img
  - img.product-img
  price_selectors:
  - .c-product-main .c-product-price__value.m-new
  - .c-product-main .c-product-price__value:not(.m-old):not(.h-hidden)
  - .c-product-detail__main .c-product-price__value.m-new
  - .c-product-detail__main .c-product-price__value:not(.m-old)
  description_selectors:
  - .c-tabs__panel.m-active
  - .c-product-detail__description
  - 'meta[name="description"]'
  section_label_map:
    ingredients_inci:
      labels:
      - ingredientes
      - composicao completa
      - ingredients
      - inci
      validators:
      - has_separators
      - min_length_30
    composition:
      labels:
      - composicao
      - composição
      - principais ingredientes
      - principais ativos
      - ingredientes principais
      - ativos principais
    description:
      labels:
      - descricao
      - sobre o produto
      - detalhes
    care_usage:
      labels:
      - como usar
      - modo de uso
      - como aplicar
      - instrucoes de uso
      - aplicacao
  use_llm_fallback: true
notes: |
  Kerastase.com.br uses Cloudflare WAF.
  curl_cffi with chrome impersonation bypasses the WAF (same approach as TRESemmé/Seda).
  Salesforce Commerce Cloud (Demandware). No Product JSON-LD available.
version: 3
